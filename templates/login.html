{% extends "base.html" %}
{% block content %}
<section class="auth-shell">
  <form class="login-card" method="post">
    <h1>Welcome back</h1>
    <p>Log in to your private ShermLabs Memory workspace.</p>
    <label>Email</label>
    <input type="email" name="email" autocomplete="email" required autofocus>
    <label>Password</label>
    <input type="password" name="password" autocomplete="current-password" required>
    <label class="checkbox-row"><input type="checkbox" name="remember"> Keep me logged in</label>
    <button type="submit">Log in</button>
    <p class="auth-switch">New here? <a href="{{ url_for('register') }}">Create an account</a></p>
  </form>
</section>
{% endblock %}
